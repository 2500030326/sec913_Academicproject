spring.application.name=coreservices

#Server Port
server.port=8001

#PostgreSQL Configuration
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://localhost:5432/newsaggregation
spring.datasource.username=postgres
spring.datasource.password=admin123

#JPA Configuration
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Third-party news provider: NewsAPI.org top-headlines endpoint.
# Set NEWSAPI_KEY in your environment, or replace the empty default below.
newsapi.key=${NEWSAPI_KEY:}
newsapi.base-url=https://newsapi.org/v2/top-headlines
newsapi.country=us
newsapi.page-size=24
